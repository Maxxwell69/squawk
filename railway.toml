# Next.js **overlay** service only. The **bridge** must not use this file — use
# `railway.bridge.toml` (per-service config path in Railway) or Dockerfile
# `apps/local-bridge/Dockerfile`. See RAILWAY.md.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Must match Dockerfile CMD: migrations before Next (Railway overrides Docker CMD when set here).
startCommand = "sh -c 'prisma migrate deploy --schema=./apps/overlay/prisma/schema.prisma && exec node apps/overlay/server.js'"
restartPolicyType = "on_failure"
