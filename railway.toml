# Next.js **overlay** service only. The **bridge** must not use this file — use
# `railway.bridge.toml` (per-service config path in Railway) or Dockerfile
# `apps/local-bridge/Dockerfile`. See RAILWAY.md.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Standalone Next image has no pnpm — run Node directly (do not use "pnpm start" in Railway UI)
startCommand = "node apps/overlay/server.js"
restartPolicyType = "on_failure"
